<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roots & Recipes | Modern Fine Dining</title>
  <meta name="description" content="Experience the finest culinary arts.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Animated Background Elements -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Navbar -->
  <nav id="navbar" class="glass-nav">
    <div class="nav-container">
      <a href="index.html" class="logo">Roots & Recipes<span>.</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="login.html">Login</a></li>
        <li>
          <a href="cart.html" class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-counter" class="counter">0</span>
          </a>
        </li>
      </ul>
      <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero">
    <div class="hero-content fade-up">
      <h1 class="hero-title">A Taste of <span class="highlight">Elegance</span></h1>
      <p class="hero-tagline">Indulge in a culinary journey where flavor meets art.</p>
      <div class="hero-buttons">
        <a href="menu.html" class="btn btn-primary glass-btn">Explore Menu</a>
        <a href="#about" class="btn btn-secondary glass-btn">Our Story</a>
      </div>
    </div>
    <div class="hero-image glass-panel fade-in delay-1">
      <img src="https://5.imimg.com/data5/SELLER/Default/2024/2/384563373/VN/ZJ/PT/2515724/restaurant-interior-designers-1000x1000.jpg" alt="Restuarant interior Image">
    </div>
  </header>

  <!-- Featured Section -->
  <section id="featured" class="section">
    <div class="section-header fade-up">
      <h2>Chef's Recommendations</h2>
      <p>Discover our signature dishes loved by food connoisseurs.</p>
    </div>
    
    <div class="grid-container" id="featured-grid">
      <!-- Generated via JS -->
    </div>
  </section>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
