<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard |Roots & Recipes</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .admin-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .admin-panel {
      padding: 2rem;
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
    .form-control {
      width: 100%; padding: 10px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border); border-radius: 8px; color: rgb(222, 240, 66);
      font-family: var(--font-body);
    }
    .order-card {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem;
    }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--highlight); font-weight: bold; }
    @media (max-width: 900px) {
      .admin-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav id="navbar" class="glass-nav">
    <div class="nav-container">
      <a href="index.html" class="logo">Roots & Recipes<span>.</span> Admin</a>
      <ul class="nav-links">
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <section class="section" style="padding-top: 120px; min-height: 100vh;">
    <div class="section-header fade-up"><h2>Admin Dashboard</h2></div>

    <div class="admin-container">
      <!-- Add Food Item Form -->
      <div class="admin-panel glass-panel fade-up delay-1">
        <h3 style="margin-bottom: 1.5rem; color: var(--highlight);">Add New Menu Item</h3>
        <form id="add-food-form">
          <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="foodName" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" step="0.01" id="foodPrice" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="foodImage" class="form-control" required placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="foodCategory" class="form-control" required>
              <option value="burger">Burger</option>
              <option value="pizza">Pizza</option>
              <option value="pasta">Pasta</option>
              <option value="drinks">Drinks</option>
              <option value="dessert">Dessert</option>
            </select>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="foodDesc" class="form-control" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary glass-btn" style="width: 100%">Add Item</button>
        </form>
      </div>

      <!-- Orders List -->
      <div class="admin-panel glass-panel fade-up delay-2">
        <h3 style="margin-bottom: 1.5rem; color: var(--highlight);">Recent Orders</h3>
        <div id="orders-container">
          <!-- Populated by JS -->
          <p>Loading orders...</p>
        </div>
      </div>
    </div>
  </section>

  <div id="toast-container"></div>
  <script src="js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user || user.role !== 'admin') {
        window.location.href = 'login.html';
        return;
      }
      fetchOrders();
    });

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }

    document.getElementById('add-food-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('foodName').value,
        price: document.getElementById('foodPrice').value,
        image: document.getElementById('foodImage').value,
        category: document.getElementById('foodCategory').value,
        description: document.getElementById('foodDesc').value
      };

      try {
        apiAddMenu(payload);
        showToast('Menu item added successfully!');
        e.target.reset();
      } catch (e) {
        showToast('Error adding item');
      }
    });

    async function fetchOrders() {
      try {
        const orders = apiGetOrders();
        const container = document.getElementById('orders-container');
        
        if (orders.length === 0) {
          container.innerHTML = '<p>No orders currently.</p>';
          return;
        }

        container.innerHTML = '';
        orders.reverse().forEach(o => {
          let itemsHtml = o.items.map(i => `<li>${i.quantity}x ${i.name} ($${i.price})</li>`).join('');
          container.innerHTML += `
            <div class="order-card">
              <div class="order-header">
                <span>Order #${o.id}</span>
                <span>$${o.total.toFixed(2)}</span>
              </div>
              <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 10px;">User / Guest ID: ${o.userId}</p>
              <ul style="padding-left: 1rem; margin-bottom: 10px; font-size: 0.9rem;">${itemsHtml}</ul>
              <span style="background: rgba(212,175,55,0.2); padding: 3px 10px; border-radius: 10px; font-size: 0.8rem; color: var(--highlight)">${o.status.toUpperCase()}</span>
            </div>
          `;
        });
      } catch (e) {
        document.getElementById('orders-container').innerHTML = '<p>Error loading orders.</p>';
      }
    }
  </script>
</body>
</html>
